{{ define "main" }}
<article class="post">
    <header>
        <h1>{{ .Title }}</h1>
    </header>

    <div class="content">
        {{ .Content | replaceRE "<h1" "<h2" | replaceRE "</h1>" "</h2>" | safeHTML }}
    </div>

    {{ if and .Site.Params.isso (eq .Section "post") }}
    <hr>
    {{ partial "isso.html" . }}
    {{ end }}
</article>
{{ end }}
